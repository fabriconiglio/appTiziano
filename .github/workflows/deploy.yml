name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 165.227.202.245
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/laravel-admin

            # --- Laravel ---
            git checkout -- .
            git clean -fd frontend/package-lock.json package-lock.json 2>/dev/null || true
            git pull origin master
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            # --- Next.js ---
            cd frontend
            pm2 stop tiendatiziano-next 2>/dev/null || true
            rm -rf .next
            if ! command -v pnpm &> /dev/null; then
              echo "pnpm no encontrado, instalando..."
              npm install -g pnpm
              if ! command -v pnpm &> /dev/null; then
                echo "ERROR CRITICO: No se pudo instalar pnpm"
                exit 1
              fi
            fi
            echo "pnpm version: $(pnpm --version)"
            pnpm install --frozen-lockfile
            pnpm run build
            pm2 describe tiendatiziano-next > /dev/null 2>&1 \
              && pm2 restart tiendatiziano-next --update-env \
              || pm2 start pnpm --name tiendatiziano-next -- start -- --port 3000
            pm2 save
